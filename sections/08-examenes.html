<section id="examenes" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>VIII. Exámenes Complementarios</h2>
            <p>Resultados imagenológicos y de laboratorio relevantes.</p>
        </div>
    </div>
    <div class="form-grid">
        <!-- Imagenología -->
        <div class="field-group col-12">
            <label for="imagenologia_obs"><i data-lucide="image"></i> Informe de Imagenología (Rx, TAC, Eco)</label>
            <textarea name="imagenologia" id="imagenologia_obs" placeholder="Hallazgos relevantes en radiografía de tórax o TAC..."></textarea>
        </div>

        <!-- Laboratorio Crítico -->
        <div class="col-12 border-t pt-1-5 mt-1">
            <h3>Gases Arteriales (EAB) y Biomarcadores</h3>
        </div>
        <div class="field-group col-3">
            <label for="gas_ph">pH</label>
            <input type="number" step="0.01" id="gas_ph" name="gas_ph" placeholder="7.35-7.45">
        </div>
        <div class="field-group col-3">
            <label for="gas_pco2">pCO2 (mmHg)</label>
            <input type="number" step="0.1" id="gas_pco2" name="gas_pco2" placeholder="35-45">
        </div>
        <div class="field-group col-3">
            <label for="gas_po2">pO2 (mmHg)</label>
            <input type="number" step="0.1" id="gas_po2" name="gas_po2" placeholder="80-100">
        </div>
        <div class="field-group col-3">
            <label for="gas_hco3">HCO3- (mEq/L)</label>
            <input type="number" step="0.1" id="gas_hco3" name="gas_hco3" placeholder="22-26">
        </div>
        <div class="field-group col-6">
            <label for="gas_be">Exceso de Base (BE)</label>
            <input type="number" step="0.1" id="gas_be" name="gas_be" placeholder="+/- 2">
        </div>
        <div class="field-group col-6">
            <label for="gas_pafi">Relación PaO2/FiO2 (PAFI)</label>
            <div class="input-wrapper">
                <input type="number" id="gas_pafi" name="gas_pafi" placeholder="Calculado">
                <span class="unit">mmHg</span>
            </div>
        </div>
        <div class="field-group col-12">
            <label for="otros_examenes">Otros (Hematocrito, PCR, BNP, Troponinas)</label>
            <textarea name="otros_examenes" id="otros_examenes"></textarea>
        </div>
    </div>
</section>
