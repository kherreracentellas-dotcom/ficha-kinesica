<section id="personales" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>I. Antecedentes Personales</h2>
            <p>Información básica y estilo de vida del paciente.</p>
        </div>
    </div>
    <div class="form-grid">
        <div class="field-group col-6">
            <label for="paciente_nombre">Nombre *</label>
            <input type="text" id="paciente_nombre" name="nombre" placeholder="Ej: Juan Pérez" required x-model="formData.paciente_nombre">
        </div>
        <div class="field-group col-3">
            <label for="sexo_val">Sexo Biológico</label>
            <select name="sexo" id="sexo_val" x-model="formData.paciente_sexo">
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
            </select>
        </div>
        <div class="field-group col-3">
            <label for="edad_val">Edad</label>
            <input type="number" name="edad" id="edad_val" placeholder="Años">
        </div>

        <div class="field-group col-4">
            <label for="fecha_nacimiento">Fecha de Nacimiento</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div>
        <div class="field-group col-4">
            <label for="paciente_rut">RUT</label>
            <input type="text" id="paciente_rut" name="rut" placeholder="12.345.678-9" required>
        </div>
        <div class="field-group col-4">
            <label for="ocupacion_val">Ocupación</label>
            <input type="text" id="ocupacion_val" name="ocupacion">
        </div>
        <div class="field-group col-6">
            <label for="prevision_val">Previsión de Salud</label>
            <input type="text" id="prevision_val" name="prevision">
        </div>
        <div class="field-group col-6">
            <label for="nivel_educacional">Nivel Educacional</label>
            <select name="nivel_educacional" id="nivel_educacional">
                <option value="">Seleccione...</option>
                <option value="basica">Básica</option>
                <option value="media">Media</option>
                <option value="tecnica">Técnica</option>
                <option value="universitaria">Universitaria</option>
            </select>
        </div>
        <div class="field-group col-6">
            <label for="fono_val">Teléfono</label>
            <input type="text" id="fono_val" name="fono" placeholder="+56 9 ...">
        </div>
        <div class="field-group col-6">
            <label for="fono_emergencia">Fono Emergencia</label>
            <input type="text" id="fono_emergencia" name="fono_emergencia">
        </div>
    </div>
</section>
