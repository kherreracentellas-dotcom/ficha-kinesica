<!-- 
    Sección VII: Percusión y Auscultación
    Evaluación sonora de la densidad pulmonar y calidad de ruidos cardiopulmonares.
-->
<section id="auscultacion" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>VII. Percusión y Auscultación</h2>
            <p>Evaluación acústica de parénquima pulmonar y precordial.</p>
        </div>
        <label class="btn-na"><input type="checkbox" name="auscultacion_na" class="hidden"><span>N/A</span></label>
    </div>
    <div class="form-grid">
        <!-- Percusión Pulmonar -->
        <div class="col-12">
            <h3 class="mb-1"><i data-lucide="waves"></i> Percusión Pulmonar</h3>
            <div class="form-grid">
                <div class="field-group col-6">
                    <label for="percusion_izq">Hemitórax Izquierdo</label>
                    <select name="percusion_izq" id="percusion_izq" x-model="formData.percusion_izq">
                        <option value="sonoridad">Sonoridad (Normal)</option>
                        <option value="hipersonoridad">Hipersonoridad</option>
                        <option value="matidez">Matidez</option>
                        <option value="timpanismo">Timpanismo</option>
                    </select>
                </div>
                <div class="field-group col-6">
                    <label for="percusion_der">Hemitórax Derecho</label>
                    <select name="percusion_der" id="percusion_der" x-model="formData.percusion_der">
                        <option value="sonoridad">Sonoridad (Normal)</option>
                        <option value="hipersonoridad">Hipersonoridad</option>
                        <option value="matidez">Matidez</option>
                        <option value="timpanismo">Timpanismo</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Auscultación Pulmonar -->
        <div class="col-12 border-t pt-1-5 mt-1">
            <h3 class="mb-1"><i data-lucide="stethoscope"></i> Auscultación Pulmonar</h3>
        </div>
        <div class="field-group col-4">
            <label for="murmullo_val">Murmullo Pulmonar</label>
            <select name="murmullo" id="murmullo_val" x-model="formData.murmullo">
                <option value="normal">Normal / (+) Conservado</option>
                <option value="disminuido">Disminuido</option>
                <option value="abolido">Abolido</option>
                <option value="aumentado">Aumentado (Soplo Pleural)</option>
            </select>
        </div>
        <div class="field-group col-4">
            <label for="ruido_laringe">Ruido Laringotraqueal</label>
            <select name="ruido_laringe" id="ruido_laringe" x-model="formData.ruido_laringe">
                <option value="normal">Presente y normal</option>
                <option value="alterado">Alterado / Estridor</option>
            </select>
        </div>
        <div class="field-group col-4">
            <label for="resonancia_vocal">Resonancia Vocal</label>
            <select name="resonancia_vocal" id="resonancia_vocal" x-model="formData.resonancia_vocal">
                <option value="normal">Normal</option>
                <option value="aumentada">Aumentada (Broncofonía)</option>
                <option value="disminuida">Disminuida</option>
                <option value="egofonia">Egofonía</option>
            </select>
        </div>

        <!-- Ruidos Adventicios -->
        <div class="field-group col-12 mt-1">
            <label>Ruidos Agregados (Hallazgos Adventicios)</label>
            <div class="check-group">
                <label class="checkbox-card"><input type="checkbox" name="ruidos_cont" value="sibilancias" x-model="formData.ruidos_cont"><span>Sibilancias</span></label>
                <label class="checkbox-card"><input type="checkbox" name="ruidos_cont" value="roncus" x-model="formData.ruidos_cont"><span>Roncus</span></label>
                <label class="checkbox-card"><input type="checkbox" name="ruidos_cont" value="estridor" x-model="formData.ruidos_cont"><span>Estridor</span></label>
                <label class="checkbox-card"><input type="checkbox" name="ruidos_disc" value="crepitos_finos" x-model="formData.ruidos_disc"><span>Crépitos Finos</span></label>
                <label class="checkbox-card"><input type="checkbox" name="ruidos_disc" value="crepitos_gruesos" x-model="formData.ruidos_disc"><span>Crépitos Gruesos</span></label>
                <label class="checkbox-card"><input type="checkbox" name="ruidos_disc" value="frote_pleural" x-model="formData.ruidos_disc"><span>Frote Pleural</span></label>
            </div>
        </div>

        <!-- Observaciones de Auscultación -->
        <div class="field-group col-12">
            <label for="ruidos_obs">Localización y Características</label>
            <textarea id="ruidos_obs" name="ruidos_obs" rows="2" placeholder="Ej: Crépitos finos en bases bilaterales..." x-model="formData.ruidos_obs"></textarea>
        </div>

        <!-- Auscultación Cardíaca -->
        <div class="col-12 border-t pt-1-5 mt-1">
            <h3 class="mb-1"><i data-lucide="heart"></i> Auscultación Precordial</h3>
        </div>
        <div class="field-group col-12">
            <div class="check-group">
                <label class="checkbox-card"><input type="checkbox" name="cardiaco_ritmico" x-model="formData.cardiaco_ritmico"><span>Ruidos Rítmicos y Normales</span></label>
                <label class="checkbox-card"><input type="checkbox" name="cardiaco_soplo" x-model="formData.cardiaco_soplo"><span>Presencia de Soplos</span></label>
                <label class="checkbox-card"><input type="checkbox" name="cardiaco_r3" x-model="formData.cardiaco_r3"><span>Presencia de R3 / R4</span></label>
            </div>
        </div>

        <!-- Detalles de Soplo (Condicional) -->
        <div class="field-group col-12" x-show="formData.cardiaco_soplo" x-transition>
            <div class="form-grid">
                <div class="field-group col-4">
                    <label for="levine_grado_val">Grado Escala Levine</label>
                    <select name="levine_grado" id="levine_grado_val" x-model="formData.levine_grado">
                        <option value="1">I/VI (Muy tenue)</option>
                        <option value="2">II/VI (Tenue)</option>
                        <option value="3">III/VI (Moderado)</option>
                        <option value="4">IV/VI (Fuerte con frémito)</option>
                        <option value="5">V/VI (Muy fuerte)</option>
                        <option value="6">VI/VI (Audible sin estetoscopio)</option>
                    </select>
                </div>
                <div class="field-group col-8">
                    <label for="soplo_foco">Foco de mayor intensidad</label>
                    <input type="text" id="soplo_foco" name="soplo_foco" placeholder="Ej: Aórtico, Mitral..." x-model="formData.soplo_foco">
                </div>
            </div>
        </div>
    </div>
</section>
