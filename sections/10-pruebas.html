<section id="pruebas" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>X. Pruebas Funcionales</h2>
            <p>Evaluación de la función pulmonar y fuerza muscular.</p>
        </div>
    </div>
    
    <div class="form-grid">
        <!-- Espirometría -->
        <div class="col-12">
            <h3 class="mb-1"><i data-lucide="bar-chart-2"></i> 1. Espirometría</h3>
            <div class="form-grid bg-surface p-1-5 border-radius-md">
                <div class="field-group col-4">
                    <label for="fvc_obs_calc">FVC (L)</label>
                    <div class="form-grid">
                        <div class="col-6"><input type="number" id="fvc_obs_calc" step="0.01" name="fvc_obs" placeholder="Obs" x-model="formData.fvc_obs"></div>
                        <div class="col-6"><input type="number" id="fvc_pred_calc" step="0.01" name="fvc_pred" placeholder="Pred" x-model="formData.fvc_pred"></div>
                    </div>
                </div>
                <div class="field-group col-2">
                    <label for="fvc_porc_calc">% FVC</label>
                    <input type="text" id="fvc_porc_calc" readonly :value="fvc_porc + '%'" class="bg-glass font-bold text-center" title="Porcentaje FVC">
                </div>
                <div class="field-group col-4">
                    <label for="fev1_obs_calc">FEV1 (L)</label>
                    <div class="form-grid">
                        <div class="col-6"><input type="number" id="fev1_obs_calc" step="0.01" name="fev1_obs" placeholder="Obs" x-model="formData.fev1_obs"></div>
                        <div class="col-6"><input type="number" id="fev1_pred_calc" step="0.01" name="fev1_pred" placeholder="Pred" x-model="formData.fev1_pred"></div>
                    </div>
                </div>
                <div class="field-group col-2">
                    <label for="fev1_porc_calc">% FEV1</label>
                    <input type="text" id="fev1_porc_calc" readonly :value="fev1_porc + '%'" class="bg-glass font-bold text-center" title="Porcentaje FEV1">
                </div>
                <div class="field-group col-12 mt-0-5">
                    <div class="flex justify-between text-sm">
                        <span>Relación FEV1/FVC: <strong x-text="fev1fvc_ratio + '%'"></strong></span>
                        <span class="font-bold text-accent" x-text="goldGrade"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="field-group col-6">
            <label for="fev1fvc_obs_val">FEV1/FVC Observado %<span class="tooltip-icon" data-tooltip="Índice de Tiffeneau real. Punto de corte universal para obstrucción: < 70%.">?</span></label>
            <div class="input-wrapper">
                <input type="number" step="0.1" id="fev1fvc_obs_val" name="fev1fvc_obs" readonly class="bg-surface font-mono" :value="fev1fvc_ratio">
                <span class="unit">%</span>
            </div>
        </div>
        <div class="field-group col-6">
            <label for="fev1fvc_pred_val">FEV1/FVC Predicho %</label>
            <div class="input-wrapper">
                <input type="number" step="0.1" id="fev1fvc_pred_val" name="fev1fvc_pred">
                <span class="unit">%</span>
            </div>
        </div>

        <div class="field-group col-12">
            <label for="fvc_diagnostico">Diagnóstico Espirométrico</label>
            <input type="text" id="fvc_diagnostico" name="fvc_diagnostico" placeholder="Ej: Patrón Obstructivo Leve">
        </div>

        <!-- 2. PIM y PEM -->
        <div class="col-12 border-t pt-1-5 mt-1">
            <h3 class="mb-1"><i data-lucide="chevrons-up"></i> 2. Músculos Respiratorios (PIM y PEM)</h3>
        </div>
        <div class="field-group col-6">
            <label for="pim_val_input">PIM (Inspiratoria Máxima)</label>
            <div class="input-wrapper">
                <input type="number" id="pim_val_input" name="pim_val" placeholder="Fuerza Diafragma">
                <span class="unit">cmH2O</span>
            </div>
        </div>
        <div class="field-group col-6">
            <label for="pem_val_input">PEM (Espiratoria Máxima)</label>
            <div class="input-wrapper">
                <input type="number" id="pem_val_input" name="pem_val" placeholder="Fuerza Abdominal">
                <span class="unit">cmH2O</span>
            </div>
        </div>

        <!-- 3. Flujometría -->
        <div class="col-12 border-t pt-1-5 mt-1">
            <h3 class="mb-1"><i data-lucide="wind"></i> 3. Flujometría (PEF)</h3>
        </div>
        <div class="field-group col-12">
            <div class="form-grid bg-surface p-1 border-radius-md">
                <div class="field-group col-4">
                    <label for="pef_obs_calc">PEF Obs (L/min)</label>
                    <input type="number" id="pef_obs_calc" name="pef_obs" placeholder="Observado">
                </div>
                <div class="field-group col-4">
                    <label for="pef_pred_calc">PEF Predicho</label>
                    <input type="number" id="pef_pred_calc" name="pef_pred" placeholder="Teórico">
                </div>
                <div class="field-group col-4">
                    <label for="pef_porc_res">% del PEF</label>
                    <input type="text" id="pef_porc_res" readonly class="bg-glass font-bold text-center" placeholder="Auto %" title="Porcentaje PEF">
                </div>
            </div>
        </div>
    </div>
</section>
