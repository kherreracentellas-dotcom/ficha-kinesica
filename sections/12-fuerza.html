<section id="fuerza" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>XII. Fuerza Muscular Periférica</h2>
            <p>Evaluación de potencia y funcionalidad muscular.</p>
        </div>
    </div>
    <div class="form-grid">
        <div class="field-group col-6">
            <label><i data-lucide="hand"></i> Dinamometría Handgrip</label>
            <div class="input-wrapper">
                <input type="number" step="0.1" name="fuerza_handgrip" placeholder="Mano dominante">
                <span class="unit">kg</span>
            </div>
        </div>
        <div class="field-group col-6">
            <label for="fuerza_cuad_val"><i data-lucide="move"></i> Fuerza Cuádriceps (MRC)</label>
            <select name="fuerza_cuadriceps" id="fuerza_cuad_val">
                <option value="5">5/5 - Fuerza Normal</option>
                <option value="4">4/5 - Contra Resistencia</option>
                <option value="3">3/5 - Contra Gravedad</option>
                <option value="2">2/5 - Sin Gravedad</option>
                <option value="1">1/5 - Contracción visible</option>
                <option value="0">0/5 - Parálisis</option>
            </select>
        </div>
    </div>
</section>
