<section id="capacidad" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>XI. Capacidad Funcional</h2>
            <p>Evaluación de esfuerzo y desempeño físico en campo.</p>
        </div>
    </div>
    <div class="form-grid">
        <div class="col-12">
            <div class="check-group mb-1">
                <label class="checkbox-card"><input type="radio" name="prueba_campo" value="tm6m" checked><span>TM6M (6 Minutos)</span></label>
                <label class="checkbox-card"><input type="radio" name="prueba_campo" value="sts"><span>Sit-to-Stand</span></label>
            </div>
        </div>

        <!-- Dashboard TM6M -->
        <div class="col-12 bg-surface p-1-5 border-radius-lg border-accent-light">
            <div class="form-grid m-0">
                <div class="field-group col-4">
                    <label for="tm6m_rec_val" class="text-accent">Recorrida (m)</label>
                    <input type="number" id="tm6m_rec_val" name="tm6m_recorrida" class="font-bold text-xl" x-model="formData.tm6m_recorrida" placeholder="Metros">
                </div>
                <div class="field-group col-4">
                    <label for="tm6m_pred_val">Predicha (m)</label>
                    <input type="text" id="tm6m_pred_val" readonly :value="tm6m_predicha_calc + ' m'" class="bg-transparent border-none font-bold text-xl" title="Distancia predicha">
                </div>
                <div class="field-group col-4">
                    <label for="tm6m_porc_val">% Alcance</label>
                    <input type="text" id="tm6m_porc_val" readonly :value="tm6m_porc_calc + '%'" class="bg-glass border-radius-full text-center font-bold text-accent" title="Porcentaje alcance">
                </div>
                
                <div class="col-12 border-t pt-1 mt-1">
                    <label class="font-bold mb-1 block">Dinámica del Test (Inicio → Fin)</label>
                    <div class="form-grid">
                        <div class="field-group col-4">
                            <label>Borg (Disnea/Fatiga)</label>
                            <input type="text" name="tm6m_borg" placeholder="Ej: 0 → 4">
                        </div>
                        <div class="field-group col-4">
                            <label>SpO2 (%)</label>
                            <input type="text" name="tm6m_spo2" placeholder="Ej: 98 → 94">
                        </div>
                        <div class="field-group col-4">
                            <label>Frec. Cardíaca</label>
                            <input type="text" name="tm6m_fc" placeholder="Ej: 70 → 115">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
