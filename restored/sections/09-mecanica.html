<!-- 
    Sección IX: Mecánica Respiratoria
    Evaluación de la dinámica ventilatoria, especialmente en pacientes con soporte ventilatorio.
-->
<section id="mecanica" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>IX. Mecánica Respiratoria</h2>
            <p>Dinámica ventilatoria y parámetros de ventilación.</p>
        </div>
    </div>
    <div class="form-grid">
        <!-- Switch de Ventilación Mecánica -->
        <div class="field-group col-12">
            <div class="check-group">
                <label class="checkbox-card">
                    <input type="checkbox" name="uso_vm" x-model="formData.uso_vm">
                    <span>Paciente en Ventilación Mecánica</span>
                </label>
            </div>
        </div>

        <!-- Parámetros VM (Condicionales con Alpine) -->
        <div class="col-12" x-show="formData.uso_vm" x-transition>
            <div class="form-grid">
                <div class="field-group col-4">
                    <label for="pip_val">Presión Pico (PIP)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" id="pip_val" name="mecanica_pip" x-model="formData.mecanica_pip">
                        <span class="unit">cmH2O</span>
                    </div>
                </div>
                <div class="field-group col-4">
                    <label for="plateau_val">Presión Meseta</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" id="plateau_val" name="mecanica_plateau" x-model="formData.mecanica_plateau">
                        <span class="unit">cmH2O</span>
                    </div>
                </div>
                <div class="field-group col-4">
                    <label for="peep_val">PEEP</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" id="peep_val" name="mecanica_peep" x-model="formData.mecanica_peep">
                        <span class="unit">cmH2O</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Complianza y Resistencia -->
        <div class="field-group col-6">
            <label for="distensibilidad_val">Complianza (Distensibilidad)</label>
            <input type="text" id="distensibilidad_val" name="mecanica_distensibilidad" x-model="formData.mecanica_distensibilidad" placeholder="Ej: Dinámica: 35 ml/cmH2O">
        </div>
        <div class="field-group col-6">
            <label for="resistencia_val">Resistencia de la Vía Aérea</label>
            <input type="text" id="resistencia_val" name="mecanica_resistencia" x-model="formData.mecanica_resistencia" placeholder="Ej: Aumentada (> 10)">
        </div>
    </div>
</section>
