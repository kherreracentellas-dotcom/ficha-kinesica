<!-- 
    Sección III: Antecedentes Mórbidos
    Registro del historial médico, diagnósticos previos y tratamiento farmacológico.
-->
<section id="morbidos" data-animate>
    <div class="section-head">
        <div class="section-title">
            <h2>III. Antecedentes Mórbidos</h2>
            <p>Anamnesis clínica y tratamiento actual.</p>
        </div>
        <label class="btn-na"><input type="checkbox" name="morbidos_na" class="hidden"><span>N/A</span></label>
    </div>
    <div class="form-grid">
        <!-- Motivo de Consulta -->
        <div class="field-group col-12">
            <label for="motivo_consulta">Motivo de Consulta</label>
            <textarea name="motivo_consulta" id="motivo_consulta" 
                placeholder="Breve descripción del problema actual..." x-model="formData.motivo_consulta"></textarea>
        </div>

        <!-- Médico Tratante -->
        <div class="field-group col-6">
            <label for="medico_tratante">Médico Tratante</label>
            <input type="text" id="medico_tratante" name="medico_tratante" x-model="formData.medico_tratante">
        </div>

        <!-- Diagnóstico Médico -->
        <div class="field-group col-12">
            <label for="diagnostico_medico">Diagnóstico Médico</label>
            <input type="text" id="diagnostico_medico" name="diagnostico_medico" x-model="formData.diagnostico_medico">
        </div>

        <!-- Enfermedades Crónicas -->
        <div class="field-group col-12">
            <label for="enfermedades_cronicas">Enfermedades Crónicas</label>
            <textarea name="enfermedades_cronicas" id="enfermedades_cronicas" x-model="formData.enfermedades_cronicas"></textarea>
        </div>

        <!-- Cirugías Previas -->
        <div class="field-group col-12">
            <label for="cirugias_previas">Cirugías Previas</label>
            <input type="text" id="cirugias_previas" name="cirugias_previas" x-model="formData.cirugias_previas">
        </div>

        <!-- Alergias -->
        <div class="field-group col-12">
            <label for="alergias_val">Alergias</label>
            <input type="text" id="alergias_val" name="alergias" x-model="formData.alergias">
        </div>

        <!-- Antecedentes Familiares -->
        <div class="field-group col-12">
            <label for="antecedentes_familiares">Antecedentes Familiares (cardiopatías, asma, etc.)</label>
            <textarea name="antecedentes_familiares" id="antecedentes_familiares" x-model="formData.antecedentes_familiares"></textarea>
        </div>

        <!-- Tratamiento Farmacológico -->
        <div class="col-12 border-t pt-1-5 mt-1">
            <h3>Tratamiento Farmacológico</h3>
        </div>

        <div class="field-group col-12">
            <label for="farmacos_continuo">Fármacos de uso continuo (ej. corticoides, antihipertensivos)</label>
            <textarea name="farmacos_continuo" id="farmacos_continuo" x-model="formData.farmacos_continuo"></textarea>
        </div>

        <div class="field-group col-12">
            <label for="farmacos_rescate">Fármacos de rescate (ej. Salbutamol)</label>
            <textarea name="farmacos_rescate" id="farmacos_rescate" x-model="formData.farmacos_rescate"></textarea>
        </div>

        <div class="field-group col-6">
            <label for="adherencia_val">Adherencia al tratamiento</label>
            <select name="adherencia" id="adherencia_val" x-model="formData.adherencia">
                <option value="si">Sí</option>
                <option value="no">No</option>
            </select>
        </div>

        <div class="field-group col-6">
            <label for="farmaco_dosis">Dosis / Frecuencia</label>
            <input type="text" id="farmaco_dosis" name="farmaco_dosis" x-model="formData.farmaco_dosis">
        </div>
    </div>
</section>
