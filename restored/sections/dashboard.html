<section id="dashboard" x-show="currentView === 'dashboard'" class="dashboard-view" x-cloak>
    <!-- Cabecera de Bienvenida -->
    <div class="dashboard-header mb-2">
        <div class="welcome-text">
            <h2 class="text-2xl font-bold">Panel de Gestión</h2>
            <p class="text-muted">Bienvenido de nuevo. Aquí tienes un resumen de la actividad clínica.</p>
        </div>
        <div class="header-actions">
            <button class="btn-primary" @click="createNewPatient()">
                <i data-lucide="plus-circle"></i>
                Nueva Ficha
            </button>
        </div>
    </div>

    <!-- Tarjetas de Estadísticas Rápidas -->
    <div class="stats-grid mb-2">
        <div class="stat-card">
            <div class="stat-icon bg-blue-soft"><i data-lucide="users" class="text-accent"></i></div>
            <div class="stat-info">
                <span class="stat-label">Total Pacientes</span>
                <span class="stat-value" x-text="patients.length">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-green-soft"><i data-lucide="calendar-check" class="text-success"></i></div>
            <div class="stat-info">
                <span class="stat-label">Evaluaciones Hoy</span>
                <span class="stat-value">4</span> <!-- Estático por ahora o calculado -->
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-orange-soft"><i data-lucide="activity" class="text-warning"></i></div>
            <div class="stat-info">
                <span class="stat-label">Casos Activos</span>
                <span class="stat-value">12</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-red-soft"><i data-lucide="alert-circle" class="text-danger"></i></div>
            <div class="stat-info">
                <span class="stat-label">Pendientes</span>
                <span class="stat-value">2</span>
            </div>
        </div>
    </div>

    <!-- Sección de Gráfico y Actividad -->
    <div class="form-grid mb-2">
        <div class="col-12">
            <div class="dashboard-card p-1-5">
                <div class="card-head mb-1">
                    <h3><i data-lucide="trending-up"></i> Flujo de Atenciones</h3>
                    <p class="text-xs text-muted">Últimos 7 días</p>
                </div>
                <canvas id="trendsChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <!-- Lista de Pacientes Premium -->
    <div class="dashboard-card">
        <div class="card-head border-b p-1-5 flex justify-between align-center">
            <h3><i data-lucide="list"></i> Listado de Pacientes</h3>
            
            <div class="search-container">
                <div class="input-wrapper search-minimal">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" placeholder="Buscar paciente..." x-model="searchQuery" @input="filterPatients()">
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Identificación</th>
                        <th>Última Evaluación</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="patient in filteredPatients" :key="patient.id">
                        <tr class="table-row-hover">
                            <td>
                                <div class="flex align-center gap-1">
                                    <div class="avatar-circle" x-text="patient.nombre.charAt(0)"></div>
                                    <div class="flex flex-col">
                                        <span class="font-bold text-main" x-text="patient.nombre"></span>
                                        <span class="text-xs text-muted" x-text="patient.data.diagnostico_medico || 'Sin diagnóstico'"></span>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge badge-outline" x-text="patient.rut"></span>
                            </td>
                            <td>
                                <div class="flex align-center gap-0-5 text-sm">
                                    <i data-lucide="clock" class="size-14 opacity-50"></i>
                                    <span x-text="patient.fecha"></span>
                                </div>
                            </td>
                            <td class="text-right">
                                <div class="flex justify-end gap-0-5">
                                    <button class="btn-icon-ghost" title="Editar Ficha" @click="loadPatient(patient.id)">
                                        <i data-lucide="edit-3"></i>
                                    </button>
                                    <button class="btn-icon-ghost text-danger" title="Eliminar" @click="deletePatient(patient.id)">
                                        <i data-lucide="trash-2"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>

                    <!-- Estado Vacío -->
                    <template x-if="filteredPatients.length === 0">
                        <tr>
                            <td colspan="4">
                                <div class="empty-state py-4 text-center">
                                    <div class="empty-icon mb-1">
                                        <i data-lucide="search-x" class="size-48 opacity-20"></i>
                                    </div>
                                    <h4 class="text-muted">No se encontraron resultados</h4>
                                    <p class="text-sm text-muted">Intenta con otros términos de búsqueda.</p>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</section>
